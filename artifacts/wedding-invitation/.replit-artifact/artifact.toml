kind = "web"
previewPath = "/"
title = "Alman & Terii Wedding Invitation"
version = "1.0.0"
id = "artifacts/wedding-invitation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19315
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/wedding-invitation run dev"

[services.env]
PORT = "19315"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/wedding-invitation", "run", "build"]
publicDir = "artifacts/wedding-invitation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
